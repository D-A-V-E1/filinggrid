services:
  postgres:
    image: postgres:16-alpine
    container_name: filinggrid-db
    environment:
      POSTGRES_USER: filinggrid
      POSTGRES_PASSWORD: filinggrid
      POSTGRES_DB: filinggrid
    ports:
      - "5432:5432"
    volumes:
      - filinggrid_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filinggrid"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    profiles: ["full"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: filinggrid-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://filinggrid:filinggrid@postgres:5432/filinggrid
      CORS_ORIGINS: http://localhost:3000
      APP_URL: http://localhost:3000
      SEC_USER_AGENT: PeerDisclosures/1.0 (dev@peerdisclosures.com)
    volumes:
      - filinggrid_cache:/app/.cache
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  filinggrid_pgdata:
  filinggrid_cache:
