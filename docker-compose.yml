services:
  postgres:
    image: postgres:16-alpine
    container_name: filinggrid-db
    environment:
      POSTGRES_USER: filinggrid
      POSTGRES_PASSWORD: filinggrid
      POSTGRES_DB: filinggrid
    ports:
      - "5432:5432"
    volumes:
      - filinggrid_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filinggrid"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  filinggrid_pgdata:
